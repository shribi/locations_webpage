<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Locations</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #d4c5a0 0%, #e8dcc8 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: linear-gradient(135deg, #ddd0b3 0%, #e8dcc8 100%);
        border-radius: 20px;
        padding: 50px 40px;
        max-width: 900px;
        width: 100%;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
        position: relative;
        border: 2px solid rgba(255, 255, 255, 0.5);
      }

      /* Decorative borders */
      .container::before,
      .container::after {
        content: "";
        position: absolute;
        left: 20px;
        right: 20px;
        height: 8px;
        background: repeating-linear-gradient(
          90deg,
          #f5f5dc 0px,
          #f5f5dc 15px,
          #d4c5a0 15px,
          #d4c5a0 25px,
          #f5f5dc 25px,
          #f5f5dc 40px,
          #d4a500 40px,
          #d4a500 45px,
          #f5f5dc 45px,
          #f5f5dc 60px
        );
        border-radius: 10px;
      }

      .container::before {
        top: 20px;
      }

      .container::after {
        bottom: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 50px;
        margin-top: 20px;
      }

      h1 {
        font-size: 2.5em;
        color: #5d4037;
        margin-bottom: 10px;
        font-weight: 600;
        letter-spacing: 2px;
      }

      .subtitle {
        font-size: 1.1em;
        color: #8d6e63;
        margin-bottom: 30px;
        font-style: italic;
      }

      .divider {
        width: 100px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #d4a500, transparent);
        margin: 20px auto;
      }

      .buttons-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 25px;
        margin-top: 30px;
      }

      .location-card {
        background: linear-gradient(135deg, #fff8dc 0%, #fffacd 100%);
        padding: 25px;
        border-radius: 15px;
        border: 2px solid #d4a500;
        text-align: center;
        transition: all 0.3s ease;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        cursor: pointer;
      }

      .location-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 30px rgba(212, 165, 0, 0.3);
        border-color: #b8860b;
        background: linear-gradient(135deg, #fffacd 0%, #ffffe0 100%);
      }

      .location-name {
        font-size: 1.3em;
        color: #5d4037;
        margin-bottom: 15px;
        font-weight: 600;
      }

      .maps-button {
        background: linear-gradient(135deg, #d4a500 0%, #b8860b 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 1em;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(212, 165, 0, 0.3);
        text-decoration: none;
        display: inline-block;
      }

      .maps-button:hover {
        background: linear-gradient(135deg, #b8860b 0%, #8b6914 100%);
        box-shadow: 0 6px 20px rgba(212, 165, 0, 0.4);
        transform: scale(1.05);
      }

      .maps-button:active {
        transform: scale(0.98);
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 1.8em;
        }

        .container {
          padding: 30px 20px;
        }

        .buttons-grid {
          grid-template-columns: 1fr;
        }

        .location-card {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Locations in Google Maps</h1>
        <div class="divider"></div>
      </div>

      <div class="buttons-grid">
        <div class="location-card">
          <div class="location-name">Home/ಸ್ವಗೃಹ</div>
          <a
            href="https://maps.app.goo.gl/pZ34Ttu5XErQot5B8?g_st=ac"
            target="_blank"
            class="maps-button"
            >Open in Maps</a
          >
        </div>

        <div class="location-card">
          <div class="location-name">Janardhana Dhama/ಜನಾರ್ದನ ಧಾಮ</div>
          <a
            href="https://maps.app.goo.gl/Gv3SPkXVPz95LUzK7"
            target="_blank"
            class="maps-button"
            >Open in Maps</a
          >
        </div>

        <div class="location-card">
          <div class="location-name">Vidyapeetha/ವಿದ್ಯಾಪೀಠ</div>
          <a
            href="https://maps.app.goo.gl/AFg3tSen2mLmDN1Z9"
            target="_blank"
            class="maps-button"
            >Open in Maps</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
